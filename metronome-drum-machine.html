<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節拍器 & 鼓機 — Roy's Lab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥁</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --comic-black: #1a1a1a;
            --warm-cream: #fff8eb;
            --warm-orange: #e8713a;
            --warm-brown: #6b4226;
            --warm-gold: #d4a853;
            --warm-red: #c0392b;
            --warm-blue: #2e86ab;
            --warm-green: #27ae60;
            --warm-purple: #8e44ad;
            --surface: #fdf6e3;
            --surface-dark: #f0e6ce;
            --border: 3px solid var(--comic-black);
            --border-thin: 2px solid var(--comic-black);
            --shadow: 4px 4px 0px var(--comic-black);
            --shadow-lg: 6px 6px 0px var(--comic-black);
            --beat-active: #27ae60;
            --beat-accent: #e8713a;
            --beat-off: #e8dcc8;
        }

        body {
            font-family: 'Noto Sans TC', 'Baloo 2', sans-serif;
            background: var(--warm-cream);
            color: var(--comic-black);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* 網點背景 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 10px 10px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            max-width: 880px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 1;
        }

        /* === HEADER === */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            border: 3px solid var(--comic-black);
            border-radius: 16px;
            padding: 16px 24px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .header-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--comic-black);
            object-fit: cover;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--warm-brown);
            line-height: 1.1;
        }

        .header-text h1 span { color: var(--warm-orange); }

        .header-text p {
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-text p i { width: 14px; height: 14px; }

        /* 漫畫狀聲詞 */
        .sfx {
            position: absolute;
            font-family: 'Baloo 2', cursive;
            font-weight: 800;
            color: var(--warm-red);
            opacity: 0.08;
            pointer-events: none;
            user-select: none;
        }

        .sfx-1 { top: -8px; right: 20px; font-size: 4rem; transform: rotate(12deg); }
        .sfx-2 { bottom: -4px; right: 120px; font-size: 2.5rem; transform: rotate(-8deg); }

        /* === PANEL (漫畫面板) === */
        .panel {
            background: white;
            border: var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .panel-title {
            font-family: 'Baloo 2', cursive;
            font-size: 1rem;
            font-weight: 700;
            color: var(--warm-brown);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #ddd;
        }

        .panel-title i {
            color: var(--warm-orange);
        }

        /* === 第一列：播放 + BPM + 節拍 === */
        .control-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* PLAY BUTTON */
        .play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid var(--comic-black);
            background: var(--warm-green);
            color: white;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--comic-black);
        }

        .play-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--comic-black);
        }

        .play-btn.playing {
            background: var(--warm-red);
        }

        .play-btn i { width: 28px; height: 28px; color: white; }

        /* BPM */
        .bpm-block {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bpm-value {
            font-family: 'Baloo 2', cursive;
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1;
            color: var(--warm-brown);
            min-width: 80px;
            text-align: center;
            transition: color 0.15s;
        }

        .bpm-value.playing { color: var(--warm-green); }

        .bpm-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .bpm-adj {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bpm-btn {
            width: 32px;
            height: 28px;
            border-radius: 6px;
            border: var(--border-thin);
            background: var(--surface);
            color: var(--comic-black);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bpm-btn:hover {
            background: var(--warm-orange);
            color: white;
        }

        /* BEAT VIZ (inline) */
        .beat-viz {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .beat-dot {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: var(--border-thin);
            background: var(--beat-off);
            transition: all 0.06s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Baloo 2', cursive;
            font-size: 0.8rem;
            font-weight: 700;
            color: #aaa;
        }

        .beat-dot.active {
            background: var(--beat-active);
            border-color: var(--beat-active);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.4);
        }

        .beat-dot.accent-beat { border-bottom: 3px solid var(--warm-orange); }
        .beat-dot.accent-beat.active {
            background: var(--beat-accent);
            border-color: var(--beat-accent);
            box-shadow: 0 0 10px rgba(232, 113, 58, 0.4);
        }

        /* === BPM SLIDER === */
        .bpm-slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
        }

        .bpm-slider-row i { color: #bbb; width: 16px; height: 16px; flex-shrink: 0; }

        .bpm-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 4px;
            background: var(--surface-dark);
            border: 1px solid #ccc;
            outline: none;
        }

        .bpm-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--warm-orange);
            border: 2px solid var(--comic-black);
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--comic-black);
        }

        /* === OPTION BUTTONS === */
        .options-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .option-group { flex: 1; min-width: 180px; }

        .option-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .option-label i { width: 14px; height: 14px; }

        .option-btns { display: flex; gap: 5px; }

        .opt-btn {
            flex: 1;
            padding: 8px 6px;
            border: var(--border-thin);
            border-radius: 8px;
            background: var(--surface);
            color: #888;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s ease;
            text-align: center;
        }

        .opt-btn:hover { border-color: var(--warm-orange); color: var(--comic-black); }

        .opt-btn.active {
            border-color: var(--warm-orange);
            background: var(--warm-orange);
            color: white;
            box-shadow: 2px 2px 0px var(--comic-black);
        }

        /* === TOOLS ROW === */
        .tools-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px dashed #ddd;
        }

        .tap-btn {
            padding: 7px 18px;
            border: var(--border-thin);
            border-radius: 20px;
            background: var(--surface);
            color: var(--warm-brown);
            font-family: 'Baloo 2', cursive;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tap-btn i { width: 16px; height: 16px; }

        .tap-btn:hover {
            background: var(--warm-gold);
            color: white;
            box-shadow: 2px 2px 0px var(--comic-black);
        }

        .tap-btn:active { transform: scale(0.95); }

        .vol-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vol-control i { width: 18px; height: 18px; color: #aaa; }

        .vol-slider {
            width: 100px;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: var(--surface-dark);
            border: 1px solid #ccc;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--warm-blue);
            border: 2px solid var(--comic-black);
            cursor: pointer;
        }

        /* TEMPO PRESETS */
        .tempo-presets {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tempo-tag {
            padding: 4px 12px;
            border-radius: 14px;
            border: 2px solid #ddd;
            background: transparent;
            color: #999;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .tempo-tag:hover {
            border-color: var(--warm-orange);
            color: var(--warm-orange);
            background: #fff5eb;
        }

        /* === DRUM MACHINE === */
        .drum-grid { display: grid; gap: 6px; }

        .drum-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .drum-label {
            width: 78px;
            min-width: 78px;
            text-align: right;
            padding-right: 6px;
            cursor: pointer;
            transition: color 0.1s;
        }

        .drum-label:hover { color: var(--warm-orange); }

        .drum-label .drum-name {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--warm-brown);
        }

        .drum-label .drum-en {
            font-size: 0.65rem;
            color: #aaa;
            font-weight: 500;
        }

        .drum-pads { display: flex; gap: 4px; flex: 1; }

        .drum-pad {
            flex: 1;
            aspect-ratio: 1;
            max-width: 44px;
            border-radius: 6px;
            border: 2px solid #ddd;
            background: var(--surface);
            cursor: pointer;
            transition: all 0.08s ease;
        }

        .drum-pad:hover { border-color: var(--warm-blue); background: #eef6fa; }

        .drum-pad.on {
            border-color: var(--warm-blue);
            background: var(--warm-blue);
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
        }

        .drum-pad.playing { border-color: var(--warm-green); }

        .drum-pad.on.playing {
            background: var(--warm-green);
            box-shadow: 0 0 8px rgba(39, 174, 96, 0.4);
        }

        /* 重拍標記 */
        .drum-pads .drum-pad:first-child { border-bottom: 3px solid var(--warm-orange); }

        /* === KEYBOARD HINT === */
        .kbd-hint {
            text-align: center;
            margin-top: 8px;
            font-size: 0.72rem;
            color: #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .kbd-hint i { width: 13px; height: 13px; }

        kbd {
            display: inline-block;
            padding: 1px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: var(--surface);
            font-family: monospace;
            font-size: 0.7rem;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #bbb;
            font-weight: 500;
        }

        .footer a { color: var(--warm-orange); text-decoration: none; }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .app { padding: 10px; }
            .header { flex-direction: column; text-align: center; padding: 16px; }
            .header-img { width: 64px; height: 64px; }
            .header-text h1 { font-size: 1.4rem; }
            .bpm-value { font-size: 2.4rem; }
            .beat-dot { width: 32px; height: 32px; font-size: 0.7rem; border-radius: 8px; }
            .drum-label { width: 56px; min-width: 56px; }
            .drum-label .drum-name { font-size: 0.72rem; }
            .drum-pad { max-width: 32px; }
            .control-bar { gap: 10px; }
            .play-btn { width: 52px; height: 52px; }
            .sfx { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition-duration: 0s !important; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <span class="sfx sfx-1">BOOM!</span>
        <span class="sfx sfx-2">TAP!</span>
        <img src="botroy-guitar.jpg" alt="波特人羅伊彈吉他" class="header-img">
        <div class="header-text">
            <h1><span>節拍器</span> & 鼓機</h1>
            <p><i data-lucide="music"></i>Metronome & Drum Machine — Powered by Tone.js</p>
        </div>
    </div>

    <!-- 第一列：播放 + BPM + 節拍視覺 -->
    <div class="panel">
        <div class="control-bar">
            <button class="play-btn" id="playBtn" onclick="togglePlay()" aria-label="播放 / 停止">
                <i data-lucide="play" id="playIcon"></i>
            </button>

            <div class="bpm-block">
                <div class="bpm-adj">
                    <button class="bpm-btn" onclick="adjustBpm(5)" aria-label="BPM +5">+5</button>
                    <button class="bpm-btn" onclick="adjustBpm(1)" aria-label="BPM +1">+1</button>
                </div>
                <div>
                    <div class="bpm-value" id="bpmDisplay">80</div>
                    <div class="bpm-label">BPM</div>
                </div>
                <div class="bpm-adj">
                    <button class="bpm-btn" onclick="adjustBpm(-1)" aria-label="BPM -1">-1</button>
                    <button class="bpm-btn" onclick="adjustBpm(-5)" aria-label="BPM -5">-5</button>
                </div>
            </div>

            <div class="beat-viz" id="beatViz"></div>
        </div>

        <div class="bpm-slider-row">
            <i data-lucide="gauge"></i>
            <input type="range" class="bpm-slider" id="bpmSlider" min="30" max="200" value="80"
                   oninput="setBpm(this.value)" aria-label="BPM 滑桿">
            <i data-lucide="zap"></i>
        </div>

        <div class="tempo-presets" style="margin-top:10px;">
            <button class="tempo-tag" onclick="setBpm(60)">Largo 60</button>
            <button class="tempo-tag" onclick="setBpm(80)">Andante 80</button>
            <button class="tempo-tag" onclick="setBpm(100)">Moderato 100</button>
            <button class="tempo-tag" onclick="setBpm(120)">Allegro 120</button>
            <button class="tempo-tag" onclick="setBpm(140)">Vivace 140</button>
            <button class="tempo-tag" onclick="setBpm(160)">Presto 160</button>
        </div>
    </div>

    <!-- 第二列：選項 + 工具 -->
    <div class="panel">
        <div class="panel-title">
            <i data-lucide="sliders-horizontal"></i>
            拍號 & 細分設定
        </div>
        <div class="options-row">
            <div class="option-group">
                <div class="option-label"><i data-lucide="music-2"></i> 每小節拍數</div>
                <div class="option-btns" id="beatsGroup">
                    <button class="opt-btn" data-val="3" onclick="setBeats(3)">3 拍</button>
                    <button class="opt-btn active" data-val="4" onclick="setBeats(4)">4 拍</button>
                </div>
            </div>
            <div class="option-group">
                <div class="option-label"><i data-lucide="music-3"></i> 音符細分</div>
                <div class="option-btns" id="subdivGroup">
                    <button class="opt-btn active" data-val="4n" onclick="setSubdiv('4n')">4 分</button>
                    <button class="opt-btn" data-val="8n" onclick="setSubdiv('8n')">8 分</button>
                    <button class="opt-btn" data-val="16n" onclick="setSubdiv('16n')">16 分</button>
                </div>
            </div>
        </div>

        <div class="tools-row">
            <button class="tap-btn" onclick="tapTempo()">
                <i data-lucide="pointer"></i> Tap Tempo
            </button>
            <div class="vol-control">
                <i data-lucide="volume-2"></i>
                <input type="range" class="vol-slider" id="volumeSlider" min="0" max="100" value="75"
                       oninput="setVolume(this.value)" aria-label="音量">
            </div>
        </div>
    </div>

    <!-- 第三列：鼓機 -->
    <div class="panel">
        <div class="panel-title">
            <i data-lucide="drum"></i>
            鼓機節奏編排
        </div>
        <div class="drum-grid" id="drumGrid"></div>

        <div class="kbd-hint">
            <i data-lucide="keyboard"></i>
            <kbd>Space</kbd> 播放/停止 &nbsp; <kbd>T</kbd> Tap Tempo
        </div>
    </div>

    <div class="footer">
        <a href="index.html">Roy's Lab</a> — 波特人羅伊的實驗室
    </div>

</div>

<script>
// === STATE ===
let bpm = 80;
let beatsPerBar = 4;
let subdivision = '4n';
let isPlaying = false;
let currentStep = -1;
let loopId = null;
let volume = 0.75;
let tapTimes = [];
const subdivMultiplier = { '4n': 1, '8n': 2, '16n': 4 };

const drumDefs = [
    { id: 'kick',      name: '大鼓',   nameEn: 'Kick' },
    { id: 'snare',     name: '小鼓',   nameEn: 'Snare' },
    { id: 'hihat',     name: '鈸',     nameEn: 'Hi-Hat' },
    { id: 'woodblock', name: '木魚',   nameEn: 'Block' },
    { id: 'clap',      name: '拍手',   nameEn: 'Clap' },
    { id: 'gong',      name: '鑼',     nameEn: 'Gong' },
];

let drumPattern = [];
let synths = {};

function initSynths() {
    const masterVol = new Tone.Volume(0).toDestination();
    synths.kick = new Tone.MembraneSynth({
        pitchDecay: 0.05, octaves: 6, oscillator: { type: 'sine' },
        envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.1 }
    }).connect(masterVol);
    synths.snare = new Tone.NoiseSynth({
        noise: { type: 'white' },
        envelope: { attack: 0.001, decay: 0.15, sustain: 0, release: 0.05 }
    }).connect(masterVol);
    // 鈸 — 用高頻短促 Synth 模擬（MetalSynth 有 routing 問題）
    synths.hihat = new Tone.Synth({
        oscillator: { type: 'square' },
        envelope: { attack: 0.001, decay: 0.06, sustain: 0, release: 0.03 }
    }).connect(masterVol);
    synths.hihat._note = 'C7';
    synths.woodblock = new Tone.MembraneSynth({
        pitchDecay: 0.01, octaves: 2, oscillator: { type: 'sine' },
        envelope: { attack: 0.001, decay: 0.08, sustain: 0, release: 0.01 }
    }).connect(masterVol);
    const clapFilter = new Tone.Filter(1200, 'bandpass').connect(masterVol);
    synths.clap = new Tone.NoiseSynth({
        noise: { type: 'white' },
        envelope: { attack: 0.001, decay: 0.12, sustain: 0, release: 0.08 }
    }).connect(clapFilter);
    // 鑼 — 用低頻長衰減 Synth 模擬
    synths.gong = new Tone.Synth({
        oscillator: { type: 'sine' },
        envelope: { attack: 0.01, decay: 0.8, sustain: 0.1, release: 0.5 }
    }).connect(masterVol);
    synths.gong._note = 'C2';
    synths._master = masterVol;
}

function triggerDrum(id, time) {
    const s = synths[id];
    if (!s) return;
    if (id === 'kick')      s.triggerAttackRelease('C1', '8n', time);
    else if (id === 'snare') s.triggerAttackRelease('8n', time);
    else if (id === 'hihat') s.triggerAttackRelease('C7', '16n', time);
    else if (id === 'woodblock') s.triggerAttackRelease('G4', '16n', time);
    else if (id === 'clap')  s.triggerAttackRelease('16n', time);
    else if (id === 'gong')  s.triggerAttackRelease('C2', '4n', time);
}

function setBpm(val) {
    bpm = Math.max(30, Math.min(200, parseInt(val)));
    document.getElementById('bpmDisplay').textContent = bpm;
    document.getElementById('bpmSlider').value = bpm;
    Tone.Transport.bpm.value = bpm;
}

function adjustBpm(delta) { setBpm(bpm + delta); }

function setBeats(val) {
    beatsPerBar = val;
    document.querySelectorAll('#beatsGroup .opt-btn').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.val) === val));
    rebuildUI();
    if (isPlaying) { stopPlay(); startPlay(); }
}

function setSubdiv(val) {
    subdivision = val;
    document.querySelectorAll('#subdivGroup .opt-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.val === val));
    rebuildUI();
    if (isPlaying) { stopPlay(); startPlay(); }
}

function setVolume(val) {
    volume = val / 100;
    if (synths._master) synths._master.volume.value = Tone.gainToDb(volume);
}

function tapTempo() {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 5) tapTimes.shift();
    if (tapTimes.length >= 2) {
        const intervals = [];
        for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
        const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
        const tapBpm = Math.round(60000 / avg);
        if (tapBpm >= 30 && tapBpm <= 200) setBpm(tapBpm);
    }
    setTimeout(() => {
        if (tapTimes.length && performance.now() - tapTimes[tapTimes.length - 1] > 2000) tapTimes = [];
    }, 2100);
}

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'KeyT') { e.preventDefault(); tapTempo(); }
});

function getTotalSteps() { return beatsPerBar * subdivMultiplier[subdivision]; }

function rebuildUI() {
    const total = getTotalSteps();
    const viz = document.getElementById('beatViz');
    viz.innerHTML = '';
    for (let i = 0; i < total; i++) {
        const dot = document.createElement('div');
        dot.className = 'beat-dot' + (i % subdivMultiplier[subdivision] === 0 ? ' accent-beat' : '');
        dot.textContent = i + 1;
        viz.appendChild(dot);
    }

    const grid = document.getElementById('drumGrid');
    grid.innerHTML = '';
    drumDefs.forEach((drum, di) => {
        if (!drumPattern[di]) drumPattern[di] = [];
        while (drumPattern[di].length < total) drumPattern[di].push(false);
        drumPattern[di].length = total;
    });

    drumDefs.forEach((drum, di) => {
        const row = document.createElement('div');
        row.className = 'drum-row';
        const label = document.createElement('div');
        label.className = 'drum-label';
        label.innerHTML = `<span class="drum-name">${drum.name}</span><span class="drum-en">${drum.nameEn}</span>`;
        label.addEventListener('click', async () => {
            await Tone.start();
            if (!synths.kick) initSynths();
            triggerDrum(drum.id, Tone.now());
        });
        row.appendChild(label);

        const pads = document.createElement('div');
        pads.className = 'drum-pads';
        for (let s = 0; s < total; s++) {
            const pad = document.createElement('div');
            pad.className = 'drum-pad' + (drumPattern[di][s] ? ' on' : '');
            pad.dataset.drum = di;
            pad.dataset.step = s;
            pad.addEventListener('click', () => {
                drumPattern[di][s] = !drumPattern[di][s];
                pad.classList.toggle('on');
            });
            pads.appendChild(pad);
        }
        row.appendChild(pads);
        grid.appendChild(row);
    });
}

async function togglePlay() {
    await Tone.start();
    if (!synths.kick) {
        initSynths();
        setVolume(document.getElementById('volumeSlider').value);
    }
    if (isPlaying) stopPlay();
    else startPlay();
}

function updatePlayIcon(playing) {
    const iconEl = document.getElementById('playIcon');
    iconEl.setAttribute('data-lucide', playing ? 'square' : 'play');
    lucide.createIcons({ nodes: [iconEl] });
}

function startPlay() {
    isPlaying = true;
    currentStep = -1;
    Tone.Transport.bpm.value = bpm;

    document.getElementById('playBtn').classList.add('playing');
    updatePlayIcon(true);
    document.getElementById('bpmDisplay').classList.add('playing');

    const total = getTotalSteps();
    loopId = Tone.Transport.scheduleRepeat((time) => {
        currentStep = (currentStep + 1) % total;
        const step = currentStep;

        drumDefs.forEach((drum, di) => {
            if (drumPattern[di][step]) triggerDrum(drum.id, time);
        });

        Tone.Draw.schedule(() => {
            document.querySelectorAll('.beat-dot').forEach((dot, i) => dot.classList.toggle('active', i === step));
            document.querySelectorAll('.drum-pad').forEach(pad => pad.classList.toggle('playing', parseInt(pad.dataset.step) === step));
        }, time);
    }, subdivision);

    Tone.Transport.start();
}

function stopPlay() {
    isPlaying = false;
    Tone.Transport.stop();
    Tone.Transport.cancel();

    document.getElementById('playBtn').classList.remove('playing');
    updatePlayIcon(false);
    document.getElementById('bpmDisplay').classList.remove('playing');
    document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
    document.querySelectorAll('.drum-pad').forEach(d => d.classList.remove('playing'));
    currentStep = -1;
}

// INIT
rebuildUI();
lucide.createIcons();
</script>
