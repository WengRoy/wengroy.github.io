<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉他和弦大師 — Roy's Lab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --comic-black: #1a1a1a;
            --warm-cream: #fff8eb;
            --warm-orange: #e8713a;
            --warm-brown: #6b4226;
            --warm-gold: #d4a853;
            --warm-red: #c0392b;
            --warm-blue: #2e86ab;
            --warm-green: #27ae60;
            --warm-purple: #8e44ad;
            --surface: #fdf6e3;
            --border: 3px solid var(--comic-black);
            --border-thin: 2px solid var(--comic-black);
            --shadow: 4px 4px 0px var(--comic-black);
            --shadow-lg: 6px 6px 0px var(--comic-black);
        }

        body {
            font-family: 'Noto Sans TC', 'Baloo 2', sans-serif;
            background: var(--warm-cream);
            color: var(--comic-black);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 10px 10px;
            pointer-events: none;
        }

        .app { max-width: 960px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

        /* HEADER */
        .header {
            display: flex; align-items: center; gap: 16px;
            background: white; border: var(--border); border-radius: 16px;
            padding: 14px 20px; box-shadow: var(--shadow-lg); margin-bottom: 14px;
            position: relative; overflow: hidden;
        }
        .header-img { width: 64px; height: 64px; border-radius: 50%; border: var(--border); object-fit: cover; flex-shrink: 0; }
        .header-text h1 { font-family: 'Baloo 2', cursive; font-size: 1.6rem; font-weight: 800; color: var(--warm-brown); line-height: 1.1; }
        .header-text h1 span { color: var(--warm-orange); }
        .header-text p { font-size: 0.8rem; color: #999; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .header-text p i { width: 14px; height: 14px; }
        .sfx { position: absolute; font-family: 'Baloo 2', cursive; font-weight: 800; opacity: 0.06; pointer-events: none; }
        .sfx-1 { top: -6px; right: 16px; font-size: 3.5rem; transform: rotate(10deg); color: var(--warm-red); }

        /* PANEL */
        .panel {
            background: white; border: var(--border); border-radius: 14px;
            padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow);
        }
        .panel-title {
            font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700;
            color: var(--warm-brown); margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
            padding-bottom: 8px; border-bottom: 2px dashed #ddd;
        }
        .panel-title i { color: var(--warm-orange); }

        /* SELECTOR BUTTONS */
        .sel-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .sel-label { font-size: 0.72rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
        .sel-label i { width: 13px; height: 13px; }

        .sel-btn {
            padding: 6px 12px; border: var(--border-thin); border-radius: 8px;
            background: var(--surface); color: #888; font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.12s; text-align: center;
        }
        .sel-btn:hover { border-color: var(--warm-orange); color: var(--comic-black); }
        .sel-btn.active { border-color: var(--warm-orange); background: var(--warm-orange); color: white; box-shadow: 2px 2px 0 var(--comic-black); }

        /* CHORD INFO */
        .chord-info {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            padding: 10px 14px; background: #fef9ef; border: 2px solid #eee;
            border-radius: 10px; margin-top: 10px;
        }
        .chord-name { font-family: 'Baloo 2', cursive; font-size: 1.6rem; font-weight: 800; color: var(--warm-brown); }
        .chord-notes { font-size: 0.9rem; font-weight: 600; color: var(--warm-blue); letter-spacing: 1px; }
        .chord-formula { font-size: 0.75rem; color: #aaa; }

        /* FRETBOARD */
        .fretboard-wrap { overflow-x: auto; padding-bottom: 8px; }
        .fretboard { display: flex; flex-direction: column; min-width: 700px; }

        .fret-numbers {
            display: flex; padding-left: 42px; margin-bottom: 2px;
        }
        .fret-num {
            width: 44px; text-align: center; font-size: 0.65rem;
            font-weight: 700; color: #bbb; flex-shrink: 0;
        }
        .fret-num.marker { color: var(--warm-orange); }

        .string-row { display: flex; align-items: center; height: 36px; }
        .string-label {
            width: 38px; text-align: center; font-family: 'Baloo 2', cursive;
            font-size: 0.85rem; font-weight: 700; color: var(--warm-brown); flex-shrink: 0;
        }
        .fret-cell {
            width: 44px; height: 36px; border-right: 1px solid #ccc;
            border-bottom: 2px solid #bba07a; display: flex; align-items: center;
            justify-content: center; position: relative; flex-shrink: 0;
        }
        .fret-cell:first-child { border-right: 3px solid var(--comic-black); background: #f5efe3; }

        .note-dot {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700; color: white;
            cursor: pointer; transition: all 0.12s; position: relative; z-index: 2;
        }
        .note-dot.root { background: var(--warm-red); }
        .note-dot.third { background: var(--warm-blue); }
        .note-dot.fifth { background: var(--warm-green); }
        .note-dot.seventh { background: var(--warm-purple); }
        .note-dot.ext { background: var(--warm-gold); }

        .note-dot:hover { transform: scale(1.2); }

        /* 選取狀態 — 外圈 */
        .note-dot.selected {
            box-shadow: 0 0 0 4px white, 0 0 0 7px var(--warm-orange);
            transform: scale(1.1);
        }

        /* ACTIONS */
        .actions-row {
            display: flex; gap: 10px; align-items: center; justify-content: center;
            flex-wrap: wrap; margin-top: 14px;
        }
        .action-btn {
            padding: 8px 20px; border: var(--border-thin); border-radius: 20px;
            font-family: 'Baloo 2', cursive; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.12s; display: flex; align-items: center; gap: 6px;
        }
        .action-btn i { width: 16px; height: 16px; }
        .action-btn:active { transform: scale(0.96); }

        .btn-listen { background: var(--warm-green); color: white; border-color: var(--comic-black); box-shadow: 2px 2px 0 var(--comic-black); }
        .btn-listen:hover { background: #219a52; }
        .btn-add { background: var(--warm-blue); color: white; border-color: var(--comic-black); box-shadow: 2px 2px 0 var(--comic-black); }
        .btn-add:hover { background: #25769a; }
        .btn-play { background: var(--warm-orange); color: white; border-color: var(--comic-black); box-shadow: 2px 2px 0 var(--comic-black); }
        .btn-play:hover { background: #d0642e; }
        .btn-stop { background: var(--warm-red); color: white; border-color: var(--comic-black); box-shadow: 2px 2px 0 var(--comic-black); }
        .btn-clear { background: var(--surface); color: #888; border-color: #ccc; }
        .btn-clear:hover { border-color: var(--warm-red); color: var(--warm-red); }

        .selected-count {
            font-size: 0.8rem; color: #aaa; font-weight: 600;
        }

        /* PROGRESSION AREA */
        .progression-grid {
            display: flex; flex-wrap: wrap; gap: 10px; min-height: 80px;
            padding: 14px; background: #fef9ef; border: 2px dashed #ddd; border-radius: 10px;
        }
        .progression-grid:empty::before {
            content: '點擊指板選取音符，按「加入和弦」開始編排和弦進行 🎵';
            color: #ccc; font-size: 0.85rem; width: 100%; text-align: center; padding: 20px 0;
        }

        .tab-card {
            width: calc(25% - 8px); min-width: 150px;
            background: white; border: var(--border-thin); border-radius: 10px;
            box-shadow: 2px 2px 0 var(--comic-black); position: relative;
            overflow: hidden;
        }
        .tab-card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; background: var(--warm-brown); color: white;
            font-family: 'Baloo 2', cursive; font-size: 0.85rem; font-weight: 700;
        }
        .tab-card-header .remove-btn {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.4); background: transparent;
            color: rgba(255,255,255,0.7); font-size: 0.7rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        .tab-card-header .remove-btn:hover { background: var(--warm-red); color: white; }

        .tab-card-body {
            padding: 6px 10px 8px; font-family: monospace; font-size: 0.72rem;
            line-height: 1.4; color: #555; white-space: pre;
        }

        /* LEGEND */
        .legend {
            display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: #999; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

        /* FOOTER */
        .footer { text-align: center; padding: 14px; font-size: 0.72rem; color: #bbb; }
        .footer a { color: var(--warm-orange); text-decoration: none; }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .app { padding: 10px; }
            .header { flex-direction: column; text-align: center; }
            .header-img { width: 52px; height: 52px; }
            .header-text h1 { font-size: 1.3rem; }
            .tab-card { width: calc(50% - 6px); min-width: 130px; }
            .sfx { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition-duration: 0s !important; }
        }
    </style>
</head>
<body>

<div class="app">

    <div class="header">
        <span class="sfx sfx-1">STRUM!</span>
        <img src="botroy-guitar.jpg" alt="波特人羅伊" class="header-img">
        <div class="header-text">
            <h1><span>吉他和弦</span>大師</h1>
            <p><i data-lucide="guitar"></i> Guitar Chord Master — 和弦指板 × 進行編排</p>
        </div>
    </div>

    <!-- 和弦選擇 -->
    <div class="panel">
        <div class="panel-title"><i data-lucide="music"></i> 和弦選擇</div>
        <div class="sel-label"><i data-lucide="key-round"></i> 根音 Key</div>
        <div class="sel-row" id="keyRow"></div>
        <div class="sel-label" style="margin-top:8px;"><i data-lucide="layers"></i> 和弦種類</div>
        <div class="sel-row" id="typeRow"></div>
        <div class="chord-info" id="chordInfo">
            <span class="chord-name" id="chordName">C</span>
            <span class="chord-notes" id="chordNotes">C E G</span>
            <span class="chord-formula" id="chordFormula">1 - 3 - 5</span>
        </div>
    </div>

    <!-- 指板 -->
    <div class="panel">
        <div class="panel-title"><i data-lucide="align-horizontal-space-between"></i> 吉他指板</div>
        <div class="legend">
            <span class="legend-item"><span class="legend-dot" style="background:var(--warm-red)"></span>根音 R</span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--warm-blue)"></span>三度</span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--warm-green)"></span>五度</span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--warm-purple)"></span>七度</span>
            <span class="legend-item"><span class="legend-dot" style="background:var(--warm-gold)"></span>延伸音</span>
            <span class="legend-item" style="font-weight:700; color:var(--warm-orange);">◎ = 已選取</span>
        </div>
        <div class="fretboard-wrap">
            <div class="fretboard" id="fretboard"></div>
        </div>

        <div class="actions-row">
            <button class="action-btn btn-listen" onclick="listenChord()"><i data-lucide="volume-2"></i> 試聽和弦</button>
            <button class="action-btn btn-add" onclick="addToProgression()"><i data-lucide="plus-circle"></i> 加入和弦進行</button>
            <span class="selected-count" id="selectedCount">已選 0 音</span>
        </div>
    </div>

    <!-- 和弦進行 -->
    <div class="panel">
        <div class="panel-title"><i data-lucide="list-music"></i> 和弦進行編曲</div>
        <div class="progression-grid" id="progressionGrid"></div>
        <div class="actions-row" style="margin-top:12px;">
            <button class="action-btn btn-play" onclick="playProgression()"><i data-lucide="play"></i> 播放進行</button>
            <button class="action-btn btn-stop" onclick="stopProgression()"><i data-lucide="square"></i> 停止</button>
            <button class="action-btn btn-clear" onclick="clearProgression()"><i data-lucide="trash-2"></i> 清空</button>
        </div>
    </div>

    <div class="footer"><a href="../index.html">Roy's Lab</a> — 波特人羅伊的實驗室</div>
</div>

<script>
// === 音樂理論 ===
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARMONIC = {'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
const STRINGS = [
    { name: 'E', midi: 64 }, // 高 E (E4)
    { name: 'B', midi: 59 },
    { name: 'G', midi: 55 },
    { name: 'D', midi: 50 },
    { name: 'A', midi: 45 },
    { name: 'E', midi: 40 }, // 低 E (E2)
];
const FRETS = 15;
const MARKERS = [3, 5, 7, 9, 12, 15];

// 和弦種類：name, suffix, intervals (半音), formula display
const CHORD_TYPES = [
    { name: 'Major',  suffix: '',     intervals: [0,4,7],       formula: '1-3-5' },
    { name: 'Minor',  suffix: 'm',    intervals: [0,3,7],       formula: '1-b3-5' },
    { name: 'Dim',    suffix: 'dim',  intervals: [0,3,6],       formula: '1-b3-b5' },
    { name: 'Aug',    suffix: 'aug',  intervals: [0,4,8],       formula: '1-3-#5' },
    { name: '7',      suffix: '7',    intervals: [0,4,7,10],    formula: '1-3-5-b7' },
    { name: 'Maj7',   suffix: 'maj7', intervals: [0,4,7,11],    formula: '1-3-5-7' },
    { name: 'Min7',   suffix: 'm7',   intervals: [0,3,7,10],    formula: '1-b3-5-b7' },
    { name: 'Dim7',   suffix: 'dim7', intervals: [0,3,6,9],     formula: '1-b3-b5-bb7' },
    { name: '9',      suffix: '9',    intervals: [0,4,7,10,14], formula: '1-3-5-b7-9' },
    { name: 'Maj9',   suffix: 'maj9', intervals: [0,4,7,11,14], formula: '1-3-5-7-9' },
    { name: 'Min9',   suffix: 'm9',   intervals: [0,3,7,10,14], formula: '1-b3-5-b7-9' },
    { name: '11',     suffix: '11',   intervals: [0,4,7,10,14,17], formula: '1-3-5-b7-9-11' },
    { name: '13',     suffix: '13',   intervals: [0,4,7,10,14,21], formula: '1-3-5-b7-9-13' },
    { name: 'Sus2',   suffix: 'sus2', intervals: [0,2,7],       formula: '1-2-5' },
    { name: 'Sus4',   suffix: 'sus4', intervals: [0,5,7],       formula: '1-4-5' },
    { name: 'Add9',   suffix: 'add9', intervals: [0,4,7,14],    formula: '1-3-5-9' },
];

// === STATE ===
let currentKey = 0; // index into NOTES
let currentType = 0; // index into CHORD_TYPES
let selectedNotes = []; // [{string, fret, note, midi}]
let progression = []; // [{name, tab, notes:[{midi}]}]
let isProgressionPlaying = false;
let progressionTimeout = null;

// === AUDIO ===
let pluckSynth = null;

function initAudio() {
    if (pluckSynth) return;
    pluckSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'triangle' },
        envelope: { attack: 0.005, decay: 0.3, sustain: 0.1, release: 0.8 },
        volume: -6
    }).toDestination();
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function playNotes(midiNotes, strum = true) {
    initAudio();
    const freqs = midiNotes.map(m => midiToFreq(m));
    if (strum) {
        // 模擬刷弦：由低到高間隔 30ms
        const sorted = [...freqs].sort((a, b) => a - b);
        sorted.forEach((f, i) => {
            const t = Tone.now() + i * 0.03;
            pluckSynth.triggerAttackRelease(f, '2n', t);
        });
    } else {
        pluckSynth.triggerAttackRelease(freqs, '2n');
    }
}

// === CHORD LOGIC ===
function getChordNotes(keyIdx, typeIdx) {
    const type = CHORD_TYPES[typeIdx];
    return type.intervals.map(i => (keyIdx + i) % 12);
}

function getChordNotesNames(keyIdx, typeIdx) {
    return getChordNotes(keyIdx, typeIdx).map(i => NOTES[i]);
}

function getChordFullName(keyIdx, typeIdx) {
    return NOTES[keyIdx] + CHORD_TYPES[typeIdx].suffix;
}

// 判斷音符在和弦中的角色（用於上色）
function getNoteRole(noteIdx, keyIdx, typeIdx) {
    const type = CHORD_TYPES[typeIdx];
    const semitones = (noteIdx - keyIdx + 12) % 12;
    const intervalIdx = type.intervals.indexOf(semitones);
    // 延伸音可能 > 12
    const extSemitones = semitones + 12;
    const extIdx = type.intervals.indexOf(extSemitones);

    if (semitones === 0) return 'root';
    if (intervalIdx === 1) return 'third';
    if (intervalIdx === 2) return 'fifth';
    if (intervalIdx === 3) return 'seventh';
    if (intervalIdx >= 4 || extIdx >= 0) return 'ext';
    return null;
}

// === BUILD UI ===
function buildSelectors() {
    const keyRow = document.getElementById('keyRow');
    NOTES.forEach((n, i) => {
        const btn = document.createElement('button');
        btn.className = 'sel-btn' + (i === currentKey ? ' active' : '');
        btn.textContent = ENHARMONIC[n] ? `${n}/${ENHARMONIC[n]}` : n;
        btn.onclick = () => { currentKey = i; selectedNotes = []; update(); };
        keyRow.appendChild(btn);
    });

    const typeRow = document.getElementById('typeRow');
    CHORD_TYPES.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = 'sel-btn' + (i === currentType ? ' active' : '');
        btn.textContent = t.name;
        btn.onclick = () => { currentType = i; selectedNotes = []; update(); };
        typeRow.appendChild(btn);
    });
}

function updateSelectors() {
    document.querySelectorAll('#keyRow .sel-btn').forEach((b, i) =>
        b.classList.toggle('active', i === currentKey));
    document.querySelectorAll('#typeRow .sel-btn').forEach((b, i) =>
        b.classList.toggle('active', i === currentType));
}

function updateChordInfo() {
    const name = getChordFullName(currentKey, currentType);
    const notes = getChordNotesNames(currentKey, currentType);
    const formula = CHORD_TYPES[currentType].formula;
    document.getElementById('chordName').textContent = name;
    document.getElementById('chordNotes').textContent = notes.join('  ');
    document.getElementById('chordFormula').textContent = formula;
}

function buildFretboard() {
    const fb = document.getElementById('fretboard');
    fb.innerHTML = '';

    const chordNoteIndices = getChordNotes(currentKey, currentType);

    // Fret numbers
    const numRow = document.createElement('div');
    numRow.className = 'fret-numbers';
    for (let f = 0; f <= FRETS; f++) {
        const d = document.createElement('div');
        d.className = 'fret-num' + (MARKERS.includes(f) ? ' marker' : '');
        d.textContent = f === 0 ? '0' : f;
        numRow.appendChild(d);
    }
    fb.appendChild(numRow);

    // Strings (high E first)
    STRINGS.forEach((str, si) => {
        const row = document.createElement('div');
        row.className = 'string-row';

        const label = document.createElement('div');
        label.className = 'string-label';
        label.textContent = str.name;
        row.appendChild(label);

        for (let f = 0; f <= FRETS; f++) {
            const cell = document.createElement('div');
            cell.className = 'fret-cell';

            const midi = str.midi + f;
            const noteIdx = midi % 12;

            if (chordNoteIndices.includes(noteIdx)) {
                const role = getNoteRole(noteIdx, currentKey, currentType);
                const dot = document.createElement('div');
                dot.className = `note-dot ${role}`;
                dot.textContent = NOTES[noteIdx];

                // 是否已被選取
                const isSelected = selectedNotes.some(n => n.string === si && n.fret === f);
                if (isSelected) dot.classList.add('selected');

                dot.onclick = () => toggleSelect(si, f, noteIdx, midi);
                cell.appendChild(dot);
            }

            row.appendChild(cell);
        }

        fb.appendChild(row);
    });
}

function toggleSelect(string, fret, noteIdx, midi) {
    const idx = selectedNotes.findIndex(n => n.string === string && n.fret === fret);
    if (idx >= 0) {
        selectedNotes.splice(idx, 1);
    } else {
        selectedNotes.push({ string, fret, note: NOTES[noteIdx], midi });
    }
    update();
}

function updateSelectedCount() {
    document.getElementById('selectedCount').textContent = `已選 ${selectedNotes.length} 音`;
}

function update() {
    updateSelectors();
    updateChordInfo();
    buildFretboard();
    updateSelectedCount();
    lucide.createIcons();
}

// === LISTEN ===
async function listenChord() {
    await Tone.start();
    initAudio();
    if (selectedNotes.length > 0) {
        playNotes(selectedNotes.map(n => n.midi));
    } else {
        // 沒選音就播和弦組成音（中間八度）
        const notes = getChordNotes(currentKey, currentType);
        const midis = notes.map(n => 48 + n); // C3 起始
        playNotes(midis);
    }
}

// === TAB 生成 ===
function generateTab(selected) {
    // 按弦排序（低E=5 到 高E=0）
    const tabData = Array(6).fill('─');
    selected.forEach(n => {
        tabData[n.string] = String(n.fret).padStart(1, ' ');
    });

    const stringNames = ['e','B','G','D','A','E'];
    let tab = '';
    for (let i = 0; i < 6; i++) {
        tab += `${stringNames[i]}|─${tabData[i].padEnd(2, '─')}─|\n`;
    }
    return tab;
}

// === ADD TO PROGRESSION ===
function addToProgression() {
    if (selectedNotes.length === 0) return;

    const name = getChordFullName(currentKey, currentType);
    const tab = generateTab(selectedNotes);
    const notes = selectedNotes.map(n => ({ ...n }));

    progression.push({ name, tab, notes });
    selectedNotes = [];
    update();
    renderProgression();
}

function removeFromProgression(idx) {
    progression.splice(idx, 1);
    renderProgression();
}

function clearProgression() {
    stopProgression();
    progression = [];
    renderProgression();
}

function renderProgression() {
    const grid = document.getElementById('progressionGrid');
    grid.innerHTML = '';

    progression.forEach((chord, i) => {
        const card = document.createElement('div');
        card.className = 'tab-card';

        const header = document.createElement('div');
        header.className = 'tab-card-header';
        header.innerHTML = `<span>${chord.name}</span>`;
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '×';
        removeBtn.onclick = () => removeFromProgression(i);
        header.appendChild(removeBtn);
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'tab-card-body';
        body.textContent = chord.tab;
        card.appendChild(body);

        grid.appendChild(card);
    });
}

// === PLAY PROGRESSION ===
async function playProgression() {
    if (progression.length === 0 || isProgressionPlaying) return;
    await Tone.start();
    initAudio();
    isProgressionPlaying = true;

    const cards = document.querySelectorAll('.tab-card');

    for (let i = 0; i < progression.length; i++) {
        if (!isProgressionPlaying) break;

        // 高亮當前卡片
        cards.forEach((c, ci) => {
            c.style.outline = ci === i ? '3px solid var(--warm-orange)' : 'none';
            c.style.outlineOffset = ci === i ? '2px' : '0';
        });

        const midis = progression[i].notes.map(n => n.midi);
        playNotes(midis);

        // 等待拍子（用 BPM 80 算約 750ms per beat，一個和弦 2 拍）
        await new Promise(r => {
            progressionTimeout = setTimeout(r, 1200);
        });
    }

    // 清除高亮
    document.querySelectorAll('.tab-card').forEach(c => {
        c.style.outline = 'none';
    });
    isProgressionPlaying = false;
}

function stopProgression() {
    isProgressionPlaying = false;
    if (progressionTimeout) clearTimeout(progressionTimeout);
    document.querySelectorAll('.tab-card').forEach(c => {
        c.style.outline = 'none';
    });
}

// === INIT ===
buildSelectors();
update();
</script>
