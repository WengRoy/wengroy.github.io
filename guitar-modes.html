<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉他指板 — 調式音階 & 七和弦</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        #app { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.6em; margin-bottom: 16px; color: #e0e0e0; }

        /* Tab 切換 */
        .tab-bar {
            display: flex; justify-content: center; gap: 4px;
            background: #16213e; border-radius: 12px; padding: 6px; margin-bottom: 16px;
        }
        .tab-btn {
            padding: 10px 28px; border: none; border-radius: 8px;
            background: transparent; color: #888; font-size: 1em; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .tab-btn:hover { color: #ccc; }
        .tab-btn.active { background: #e94560; color: white; }

        /* 控制面板 */
        #controls {
            background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .control-group { margin-bottom: 14px; }
        .control-group:last-of-type { margin-bottom: 0; }
        .control-group label {
            display: block; font-size: 0.82em; color: #888;
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn {
            padding: 8px 16px; border: 2px solid #333; border-radius: 8px;
            background: #0f3460; color: #ccc; font-size: 1em;
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .btn:hover { background: #1a5276; border-color: #3498db; }
        .btn.active { background: #e94560; border-color: #e94560; color: white; font-weight: bold; }

        /* 音階資訊 + 描述 */
        #info-panel {
            margin-top: 14px; padding: 16px 20px;
            background: #0f3460; border-radius: 10px;
        }
        #info-panel .info-title {
            font-size: 1.3em; font-weight: bold; color: #e94560; margin-bottom: 4px;
        }
        #info-panel .info-notes {
            font-size: 1.05em; color: #aaa; letter-spacing: 3px; margin-bottom: 10px;
        }
        #info-panel .info-formula {
            font-size: 0.95em; color: #ccc; margin-bottom: 6px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        #info-panel .info-formula .char-note {
            color: #f39c12; font-weight: bold; text-decoration: underline;
            text-underline-offset: 3px;
        }
        #info-panel .info-desc {
            font-size: 0.9em; color: #999; line-height: 1.6;
        }
        #info-panel .info-desc .highlight {
            color: #f39c12; font-weight: 600;
        }
        #info-panel .info-usage {
            margin-top: 6px; font-size: 0.85em; color: #666;
        }

        /* 指板 */
        #fretboard-container {
            background: #16213e; border-radius: 12px; padding: 15px 10px; overflow-x: auto;
        }
        #fretboard { width: 100%; height: auto; display: block; }

        /* 圖例 */
        #legend {
            display: flex; justify-content: center; flex-wrap: wrap;
            gap: 18px; margin-top: 14px; padding: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: #999; }
        .legend-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .legend-dot.char-dot { border: 3px solid #f39c12; }

        /* 導航連結 */
        .nav-link {
            display: block; text-align: center; margin-top: 16px;
            color: #555; font-size: 0.85em; text-decoration: none;
        }
        .nav-link:hover { color: #3498db; }
    </style>
</head>
<body>
<div id="app">
    <h1>🎸 吉他指板 — 調式音階 & 七和弦內音</h1>

    <!-- Tab 切換 -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="modes">調式音階 Modes</button>
        <button class="tab-btn" data-tab="chords">七和弦內音 7th Chords</button>
    </div>

    <div id="controls">
        <div class="control-group">
            <label>根音 Root Key</label>
            <div id="key-buttons" class="btn-group"></div>
        </div>
        <div class="control-group" id="mode-group">
            <label>調式 Mode</label>
            <div id="mode-buttons" class="btn-group"></div>
        </div>
        <div class="control-group" id="chord-group" style="display:none">
            <label>和弦類型 Chord Type</label>
            <div id="chord-buttons" class="btn-group"></div>
        </div>
        <div id="info-panel">
            <div class="info-title"></div>
            <div class="info-notes"></div>
            <div class="info-formula"></div>
            <div class="info-desc"></div>
            <div class="info-usage"></div>
        </div>
    </div>

    <div id="fretboard-container">
        <svg id="fretboard"></svg>
    </div>
    <div id="legend"></div>

    <a class="nav-link" href="index.html">← 回到一弦三音 & 五聲音階指板</a>
</div>

<script>
// ===== 基礎常數 =====
const KEYS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const LETTERS = ['C','D','E','F','G','A','B'];
const LETTER_SEMI = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
const STRING_MIDI = [40, 45, 50, 55, 59, 64];
const STRING_NAMES = ['6E','5A','4D','3G','2B','1E'];

// SVG 繪圖常數
const ML = 70, MT = 38, FW = 58, SG = 36, NF = 16, NR = 15;
const SVG_W = ML + NF * FW + 30;
const SVG_H = MT + 5 * SG + 50;
const INLAYS = [3,5,7,9,15];
const DOUBLE_INLAY = [12];

// 級數顏色 (7音)
const DEG7_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c'];
// 級數顏色 (4音和弦)
const DEG4_COLORS = ['#e74c3c','#f1c40f','#3498db','#9b59b6'];

// ===== 七種調式資料 =====
const MODES = [
    {
        id: 'ionian', name: 'Ionian', nameCn: '伊奧尼安（大調）',
        intervals: [0,2,4,5,7,9,11],
        formula: '1 — 2 — 3 — 4 — 5 — 6 — 7',
        charDegree: -1, // 無特色音
        desc: '就是標準的大調音階，明亮、歡樂、穩定。西洋音樂最基礎的調式。',
        charDesc: '',
        usage: '流行音樂、古典音樂、幾乎所有需要「明亮正面」情緒的場景',
    },
    {
        id: 'dorian', name: 'Dorian', nameCn: '多利安',
        intervals: [0,2,3,5,7,9,10],
        formula: '1 — 2 — <b3> — 4 — 5 — <6> — b7',
        charDegree: 5, // 第6級（index 5）是特色音
        desc: '小調底色但第6音保持還原（比自然小調的 b6 高半音），' +
              '營造出<span class="highlight">神秘卻不陰暗</span>的氛圍，帶有一絲希望感。',
        charDesc: '特色音 <span class="highlight">6（還原六度）</span> — 這是 Dorian 與自然小調唯一的差異',
        usage: 'RPG 村莊音樂、爵士即興、Santana 風格、Miles Davis "So What"',
    },
    {
        id: 'phrygian', name: 'Phrygian', nameCn: '弗里吉安',
        intervals: [0,1,3,5,7,8,10],
        formula: '1 — <b2> — b3 — 4 — 5 — b6 — b7',
        charDegree: 1, // b2 是特色音
        desc: '根音到第2音只有半音，製造出強烈的<span class="highlight">異國風情與張力</span>。' +
              '聽感極度特殊，有西班牙佛朗明哥、中東、阿拉伯的色彩。',
        charDesc: '特色音 <span class="highlight">b2（降二度）</span> — 半音下行的招牌聲響',
        usage: '佛朗明哥吉他、金屬樂 breakdown、中東風配樂、Metallica "Wherever I May Roam"',
    },
    {
        id: 'lydian', name: 'Lydian', nameCn: '利底安',
        intervals: [0,2,4,6,7,9,11],
        formula: '1 — 2 — 3 — <#4> — 5 — 6 — 7',
        charDegree: 3, // #4 是特色音
        desc: '比大調多了一個升4度（#4），形成三全音，製造出<span class="highlight">夢幻、飄浮、超現實</span>的感覺。' +
              '像是懸浮在空中，比大調更明亮更開放。',
        charDesc: '特色音 <span class="highlight">#4（升四度）</span> — 三全音製造出飄浮感',
        usage: '電影配樂（Steven Spielberg 最愛）、Joe Satriani "Flying in a Blue Dream"、Steve Vai',
    },
    {
        id: 'mixolydian', name: 'Mixolydian', nameCn: '混合利底安',
        intervals: [0,2,4,5,7,9,10],
        formula: '1 — 2 — 3 — 4 — 5 — 6 — <b7>',
        charDegree: 6, // b7 是特色音
        desc: '大調底色但第7音降半音，製造出<span class="highlight">藍調、搖滾的推動力</span>。' +
              '聽起來放鬆、有律動感，比大調少了一點「解決感」。',
        charDesc: '特色音 <span class="highlight">b7（降七度）</span> — 屬七和弦的核心音',
        usage: '藍調搖滾、鄉村音樂、The Beatles "Norwegian Wood"、AC/DC',
    },
    {
        id: 'aeolian', name: 'Aeolian', nameCn: '艾奧里安（自然小調）',
        intervals: [0,2,3,5,7,8,10],
        formula: '1 — 2 — b3 — 4 — 5 — b6 — b7',
        charDegree: -1, // 無特色音
        desc: '標準的自然小調音階，<span class="highlight">憂鬱、深沉、情感豐富</span>。' +
              '最常用的小調調式，所有小調的基準。',
        charDesc: '',
        usage: '搖滾抒情、R&B、大量流行音樂悲傷曲、"Stairway to Heaven"',
    },
    {
        id: 'locrian', name: 'Locrian', nameCn: '洛克里安',
        intervals: [0,1,3,5,6,8,10],
        formula: '1 — <b2> — b3 — 4 — <b5> — b6 — b7',
        charDegree: 4, // b5 是特色音
        desc: '七個調式中最不穩定的，因為第5音降半音（減五度），<span class="highlight">根音無法建立穩定的家感</span>。' +
              '聽感極度緊張、不安定、黑暗。',
        charDesc: '特色音 <span class="highlight">b5（減五度）</span> — 極度不穩定，破壞了完全五度的支撐',
        usage: '重金屬、死亡金屬、實驗音樂，很少單獨使用整個音階',
    },
];

// ===== 七和弦資料 =====
const CHORDS = [
    {
        id: 'maj7', name: 'Major 7', nameCn: '大七和弦',
        intervals: [0,4,7,11],
        degreeLabels: ['R 根音','3 大三度','5 完全五度','7 大七度'],
        desc: '溫暖、成熟、爵士感。大三度 + 完全五度 + 大七度。聽感柔和而飽滿。',
        usage: '爵士標準曲、Bossa Nova、City Pop、neo-soul',
    },
    {
        id: 'min7', name: 'Minor 7', nameCn: '小七和弦',
        intervals: [0,3,7,10],
        degreeLabels: ['R 根音','b3 小三度','5 完全五度','b7 小七度'],
        desc: '柔和、憂鬱但不沉重。小三度 + 完全五度 + 小七度。比小三和弦更有深度。',
        usage: '爵士樂、R&B、Lo-fi Hip Hop、neo-soul',
    },
    {
        id: 'dom7', name: 'Dominant 7', nameCn: '屬七和弦',
        intervals: [0,4,7,10],
        degreeLabels: ['R 根音','3 大三度','5 完全五度','b7 小七度'],
        desc: '帶有強烈的<span class="highlight">張力與推動力</span>。大三度 + 完全五度 + 小七度。' +
              '3 和 b7 之間形成三全音，製造解決到主和弦的慾望。',
        usage: '藍調、搖滾、Funk、所有需要「推進」感的和弦進行',
    },
];

// ===== 狀態 =====
let currentTab = 'modes';
let currentKey = 'C';
let currentMode = 'dorian';
let currentChord = 'maj7';

// ===== 工具函式 =====
function noteNameToSemitone(name) {
    let semi = LETTER_SEMI[name[0]];
    for (let i = 1; i < name.length; i++) {
        if (name[i] === '#') semi++;
        if (name[i] === 'b') semi--;
    }
    return ((semi % 12) + 12) % 12;
}

/** 根據根音 + 音程 + 字母偏移量，產生正確拼寫的音名 */
function buildNoteNames(rootName, intervals, letterOffsets) {
    const rootIdx = LETTERS.indexOf(rootName[0]);
    const rootSemi = noteNameToSemitone(rootName);

    return intervals.map((interval, i) => {
        const targetSemi = (rootSemi + interval) % 12;
        const letterIdx = (rootIdx + letterOffsets[i]) % 7;
        const letter = LETTERS[letterIdx];
        const naturalSemi = LETTER_SEMI[letter];
        const diff = (targetSemi - naturalSemi + 12) % 12;

        if (diff === 0) return letter;
        if (diff === 1) return letter + '#';
        if (diff === 11) return letter + 'b';
        if (diff === 2) return letter + '##';
        if (diff === 10) return letter + 'bb';
        return letter;
    });
}

/** 7音調式的字母偏移：0,1,2,3,4,5,6 */
const MODE_LETTER_OFFSETS = [0,1,2,3,4,5,6];
/** 4音和弦的字母偏移：1,3,5,7 度 */
const CHORD_LETTER_OFFSETS = [0,2,4,6];

// ===== 全指板計算 =====
function calcAllPositions(rootKey, intervals, noteNames) {
    const rootSemi = noteNameToSemitone(rootKey);
    const scaleSemitones = intervals.map(i => (rootSemi + i) % 12);
    const positions = [];

    for (let s = 0; s < 6; s++) {
        const openSemi = STRING_MIDI[s] % 12;
        for (let fret = 0; fret <= NF; fret++) {
            const noteSemi = (openSemi + fret) % 12;
            const degIdx = scaleSemitones.indexOf(noteSemi);
            if (degIdx !== -1) {
                positions.push({
                    string: s, fret,
                    name: noteNames[degIdx],
                    degree: degIdx,
                    isRoot: degIdx === 0,
                });
            }
        }
    }
    return positions;
}

// ===== SVG 繪製 =====
function getNoteX(fret) {
    return fret === 0 ? ML - 22 : ML + (fret - 0.5) * FW;
}
function getStringY(s) {
    return MT + (5 - s) * SG;
}

function drawFretboard(positions, degreeColors, charDegreeIdx) {
    let svg = '';

    // 指板底色
    svg += `<rect x="${ML}" y="${MT-16}" width="${NF*FW}" height="${5*SG+32}" rx="4" fill="#3e2723" opacity="0.5"/>`;

    // Inlay 記號
    const midY = MT + 2.5 * SG;
    INLAYS.forEach(f => {
        if (f <= NF) {
            svg += `<circle cx="${ML+(f-0.5)*FW}" cy="${midY}" r="6" fill="#555" opacity="0.5"/>`;
        }
    });
    DOUBLE_INLAY.forEach(f => {
        if (f <= NF) {
            const cx = ML+(f-0.5)*FW;
            svg += `<circle cx="${cx}" cy="${midY-40}" r="6" fill="#555" opacity="0.5"/>`;
            svg += `<circle cx="${cx}" cy="${midY+40}" r="6" fill="#555" opacity="0.5"/>`;
        }
    });

    // 上弦枕
    svg += `<line x1="${ML}" y1="${MT-16}" x2="${ML}" y2="${MT+5*SG+16}" stroke="#ddd" stroke-width="5"/>`;
    // 琶格線
    for (let f = 1; f <= NF; f++) {
        const x = ML + f * FW;
        svg += `<line x1="${x}" y1="${MT-16}" x2="${x}" y2="${MT+5*SG+16}" stroke="#888" stroke-width="2"/>`;
    }

    // 弦
    for (let s = 0; s < 6; s++) {
        const y = getStringY(s);
        const th = 1.5 + (5-s)*0.5;
        svg += `<line x1="${ML-30}" y1="${y}" x2="${ML+NF*FW}" y2="${y}" stroke="#bbb" stroke-width="${th}" opacity="0.7"/>`;
        svg += `<text x="${ML-50}" y="${y+5}" text-anchor="middle" fill="#888" font-size="13" font-family="monospace">${STRING_NAMES[s]}</text>`;
    }

    // 琶格編號
    for (let f = 0; f <= NF; f++) {
        const x = f === 0 ? ML-22 : ML+(f-0.5)*FW;
        svg += `<text x="${x}" y="${MT+5*SG+40}" text-anchor="middle" fill="#666" font-size="11">${f}</text>`;
    }

    // 音符圓圈
    positions.forEach(p => {
        if (p.fret < 0 || p.fret > NF) return;
        const cx = getNoteX(p.fret);
        const cy = getStringY(p.string);
        const color = degreeColors[p.degree];
        const isChar = (p.degree === charDegreeIdx);
        const r = p.isRoot ? NR + 2 : NR;

        // 特色音外框（金色菱形光暈）
        if (isChar) {
            svg += `<circle cx="${cx}" cy="${cy}" r="${r+5}" fill="none" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="4,3" opacity="0.8"/>`;
        }

        // 外圈光暈
        svg += `<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="${color}" opacity="0.2"/>`;
        // 主圓
        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>`;
        // 根音額外白環
        if (p.isRoot) {
            svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>`;
        }
        // 音名
        const fs = p.name.length > 2 ? 9 : (p.name.length > 1 ? 11 : 13);
        const tc = color === '#f1c40f' ? '#333' : '#fff';
        svg += `<text x="${cx}" y="${cy+4.5}" text-anchor="middle" fill="${tc}" font-size="${fs}" font-weight="bold" font-family="-apple-system,sans-serif">${p.name}</text>`;
    });

    const svgEl = document.getElementById('fretboard');
    svgEl.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
    svgEl.innerHTML = svg;
}

// ===== 渲染主函式 =====
function render() {
    if (currentTab === 'modes') {
        renderMode();
    } else {
        renderChord();
    }
}

function renderMode() {
    const mode = MODES.find(m => m.id === currentMode);
    const noteNames = buildNoteNames(currentKey, mode.intervals, MODE_LETTER_OFFSETS);
    const positions = calcAllPositions(currentKey, mode.intervals, noteNames);

    // 資訊面板
    document.querySelector('.info-title').textContent = `${currentKey} ${mode.name} — ${mode.nameCn}`;
    document.querySelector('.info-notes').textContent = noteNames.join('  ');

    // 音程公式（特色音高亮）
    const formulaParts = mode.formula.replace(/<(\w+[#b]?)>/g,
        '<span class="char-note">$1</span>');
    document.querySelector('.info-formula').innerHTML = '音程公式：' + formulaParts;

    // 描述
    let descHtml = mode.desc;
    if (mode.charDesc) {
        descHtml += '<br>' + mode.charDesc;
    }
    document.querySelector('.info-desc').innerHTML = descHtml;
    document.querySelector('.info-usage').innerHTML = mode.usage ? '常見應用：' + mode.usage : '';

    // 指板
    drawFretboard(positions, DEG7_COLORS, mode.charDegree);

    // 圖例
    const degLabels = ['1 根音','2','3','4','5','6','7'];
    // 根據調式標記升降
    const modeFormulaParts = mode.formula.replace(/<|>/g,'').split(' — ');
    const legendEl = document.getElementById('legend');
    legendEl.innerHTML = '';
    modeFormulaParts.forEach((label, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        const isChar = (i === mode.charDegree);
        item.innerHTML = `<span class="legend-dot ${isChar ? 'char-dot' : ''}" style="background:${DEG7_COLORS[i]}"></span>${label}${isChar ? ' ★' : ''}`;
        legendEl.appendChild(item);
    });
}

function renderChord() {
    const chord = CHORDS.find(c => c.id === currentChord);
    const noteNames = buildNoteNames(currentKey, chord.intervals, CHORD_LETTER_OFFSETS);
    const positions = calcAllPositions(currentKey, chord.intervals, noteNames);

    // 資訊面板
    document.querySelector('.info-title').textContent = `${currentKey} ${chord.name} — ${chord.nameCn}`;
    document.querySelector('.info-notes').textContent = noteNames.join('  ');
    document.querySelector('.info-formula').innerHTML =
        '組成：' + chord.degreeLabels.map((l,i) =>
            `<span style="color:${DEG4_COLORS[i]};font-weight:bold">${noteNames[i]}</span> (${l})`
        ).join(' — ');
    document.querySelector('.info-desc').innerHTML = chord.desc;
    document.querySelector('.info-usage').innerHTML = chord.usage ? '常見應用：' + chord.usage : '';

    // 指板
    drawFretboard(positions, DEG4_COLORS, -1);

    // 圖例
    const legendEl = document.getElementById('legend');
    legendEl.innerHTML = '';
    chord.degreeLabels.forEach((label, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="legend-dot" style="background:${DEG4_COLORS[i]}"></span>${noteNames[i]} — ${label}`;
        legendEl.appendChild(item);
    });
}

// ===== UI 初始化 =====
function initUI() {
    // Tab 切換
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            currentTab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('mode-group').style.display = currentTab === 'modes' ? '' : 'none';
            document.getElementById('chord-group').style.display = currentTab === 'chords' ? '' : 'none';
            render();
        };
    });

    // Key 按鈕
    const keyContainer = document.getElementById('key-buttons');
    KEYS.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'btn' + (key === currentKey ? ' active' : '');
        btn.textContent = key;
        btn.onclick = () => {
            currentKey = key;
            keyContainer.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        };
        keyContainer.appendChild(btn);
    });

    // Mode 按鈕
    const modeContainer = document.getElementById('mode-buttons');
    MODES.forEach(mode => {
        const btn = document.createElement('button');
        btn.className = 'btn' + (mode.id === currentMode ? ' active' : '');
        btn.textContent = mode.name;
        btn.onclick = () => {
            currentMode = mode.id;
            modeContainer.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        };
        modeContainer.appendChild(btn);
    });

    // Chord 按鈕
    const chordContainer = document.getElementById('chord-buttons');
    CHORDS.forEach(chord => {
        const btn = document.createElement('button');
        btn.className = 'btn' + (chord.id === currentChord ? ' active' : '');
        btn.textContent = `${chord.nameCn} ${chord.name}`;
        btn.onclick = () => {
            currentChord = chord.id;
            chordContainer.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        };
        chordContainer.appendChild(btn);
    });
}

// ===== 啟動 =====
initUI();
render();
</script>
</body>
</html>
